<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二叉搜索树第K小元素 - 算法可视化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .node-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-enter { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-target { animation: pulseGreen 1.5s infinite; }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- 图标组件 ---
    const Icons = {
        Play: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
        Pause: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>,
        Step: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>,
        Reset: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12" /><path d="M3 3v9h9" /></svg>,
        Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
        Shuffle: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>,
        GitBranch: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="3" x2="6" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>,
        Layers: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>,
        List: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
    };

    // --- 树节点类 ---
    class TreeNode {
        constructor(val, left = null, right = null) {
            this.val = val;
            this.left = left;
            this.right = right;
            this.id = Math.random().toString(36).substr(2, 9);
        }
    }

    const App = () => {
        // --- 状态定义 ---
        const [inputStr, setInputStr] = useState("[5,3,6,2,4,null,null,1]");
        const [kInput, setKInput] = useState(3);
        const [rootNode, setRootNode] = useState(null);

        // 运行状态
        const [mode, setMode] = useState("iterative"); // 'recursive' | 'iterative'
        const [isPlaying, setIsPlaying] = useState(false);
        const [isFinished, setIsFinished] = useState(false);
        const [message, setMessage] = useState("准备就绪");

        // 算法状态 - 迭代法
        const [stack, setStack] = useState([]); // [{node, visited: boolean}]
        const [curr, setCurr] = useState(null); // Current node being processed
        const [iterPhase, setIterPhase] = useState("INIT"); // INIT, PUSH_LEFT, POP_PROCESS, GO_RIGHT

        // 算法状态 - 递归法 (预计算回放)
        const [recSteps, setRecSteps] = useState([]);
        const [recIdx, setRecIdx] = useState(0);

        // 通用结果状态
        const [visitedCount, setVisitedCount] = useState(0);
        const [foundVal, setFoundVal] = useState(null);
        const [currentNodeId, setCurrentNodeId] = useState(null);
        const [visitedList, setVisitedList] = useState([]);

        // 布局相关
        const [flatNodes, setFlatNodes] = useState([]);
        const [treeViewBox, setTreeViewBox] = useState("0 0 800 600");

        // --- 树构建与布局 ---
        const buildTree = (arr) => {
            if (!arr || arr.length === 0) return null;
            const root = new TreeNode(arr[0]);
            const queue = [root];
            let i = 1;
            while (i < arr.length) {
                const curr = queue.shift();
                if (arr[i] !== null) {
                    curr.left = new TreeNode(arr[i]);
                    queue.push(curr.left);
                }
                i++;
                if (i < arr.length && arr[i] !== null) {
                    curr.right = new TreeNode(arr[i]);
                    queue.push(curr.right);
                }
                i++;
            }
            return root;
        };

        const calculateLayout = (root) => {
            const nodes = [];
            const assignCoords = (n, x, y, offset) => {
                if (!n) return;
                n.x = x;
                n.y = y;
                nodes.push(n);
                assignCoords(n.left, x - offset, y + 80, offset / 2);
                assignCoords(n.right, x + offset, y + 80, offset / 2);
            };
            assignCoords(root, 400, 50, 180);

            if (nodes.length > 0) {
                let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
                nodes.forEach(n => {
                    minX=Math.min(minX, n.x); maxX=Math.max(maxX, n.x);
                    minY=Math.min(minY, n.y); maxY=Math.max(maxY, n.y);
                });
                const p = 60;
                const viewBox = `${minX - p} ${minY - p} ${Math.max(maxX - minX + p * 2, 800)} ${Math.max(maxY - minY + p * 2, 500)}`;
                setTreeViewBox(viewBox);
            }
            return nodes;
        };

        const parseInput = () => {
            try {
                const arr = JSON.parse(inputStr);
                const k = parseInt(kInput);
                if (!Array.isArray(arr)) throw new Error("输入必须是数组");
                if (isNaN(k) || k < 1) throw new Error("K 必须 > 0");

                const root = buildTree(arr);
                setRootNode(root);
                const layout = calculateLayout(root);
                setFlatNodes(layout);

                resetState(root, k);
                setMessage(`树已构建。寻找第 ${k} 小的元素。`);
            } catch (e) {
                setMessage("输入错误: " + e.message);
            }
        };

        const resetState = (root = rootNode, k = parseInt(kInput)) => {
            setIsPlaying(false);
            setIsFinished(false);
            setMessage("状态已重置");
            setVisitedCount(0);
            setFoundVal(null);
            setCurrentNodeId(null);
            setVisitedList([]);

            // Iterative Reset
            setStack([]);
            setCurr(root);
            setIterPhase("INIT");

            // Recursive Reset (Pre-calculate)
            const steps = [];
            const inorder = (n) => {
                if (!n) return;
                inorder(n.left);
                steps.push(n);
                inorder(n.right);
            };
            if(root) inorder(root);
            setRecSteps(steps);
            setRecIdx(0);
        };

        const randomInput = () => {
            const count = 7 + Math.floor(Math.random() * 6);
            const nums = new Set();
            while(nums.size < count) nums.add(Math.floor(Math.random() * 50) + 1);
            const sorted = Array.from(nums).sort((a,b) => a-b);

            const buildBST = (arr, start, end) => {
                if (start > end) return null;
                const mid = Math.floor((start + end) / 2);
                const node = new TreeNode(sorted[mid]);
                node.left = buildBST(arr, start, mid - 1);
                node.right = buildBST(arr, mid + 1, end);
                return node;
            };
            const root = buildBST(sorted, 0, sorted.length - 1);

            // Serialize
            const res = [];
            const queue = [root];
            while(queue.length > 0) {
                const n = queue.shift();
                if (n) {
                    res.push(n.val);
                    queue.push(n.left);
                    queue.push(n.right);
                } else {
                    res.push(null);
                }
            }
            while(res.length > 0 && res[res.length-1] === null) res.pop();

            const k = Math.floor(Math.random() * count) + 1;
            setInputStr(JSON.stringify(res));
            setKInput(k);

            setRootNode(root);
            const layout = calculateLayout(root);
            setFlatNodes(layout);
            resetState(root, k);
            setMessage(`随机生成 BST。K=${k}`);
        };

        // --- 自动播放 ---
        useEffect(() => {
            let timer;
            if (isPlaying && !isFinished) {
                timer = setInterval(() => {
                    stepForward();
                }, 1000);
            }
            return () => clearInterval(timer);
        }, [isPlaying, isFinished, mode, iterPhase, curr, stack, recIdx]);

        const stepForward = () => {
            if (isFinished) return;
            if (mode === 'iterative') stepIterative();
            else stepRecursive();
        };

        // 1. Iterative Logic (Stack)
        const stepIterative = () => {
            const k = parseInt(kInput);
            let myStack = [...stack];
            let myCurr = curr;

            if (iterPhase === "INIT") {
                setIterPhase("PUSH_LEFT");
                setMessage("开始：从根节点出发，向左深入。");
                return;
            }

            if (iterPhase === "PUSH_LEFT") {
                if (myCurr) {
                    myStack.push(myCurr);
                    setStack(myStack);
                    setCurrentNodeId(myCurr.id);
                    setMessage(`遇到节点 ${myCurr.val}，入栈。继续向左。`);
                    setCurr(myCurr.left);
                } else {
                    // Cannot go left anymore
                    setIterPhase("POP_PROCESS");
                    setMessage("左侧到底 (NULL)，准备出栈处理。");
                    setCurrentNodeId(null);
                }
            }
            else if (iterPhase === "POP_PROCESS") {
                if (myStack.length > 0) {
                    const node = myStack.pop();
                    setStack(myStack);
                    setCurrentNodeId(node.id);

                    const newCount = visitedCount + 1;
                    setVisitedCount(newCount);
                    setVisitedList(prev => [...prev, node.val]);

                    if (newCount === k) {
                        setIsFinished(true);
                        setIsPlaying(false);
                        setFoundVal(node.val);
                        setMessage(`🎉 计数达到 K=${k}！找到目标：${node.val}。`);
                        return;
                    }

                    setMessage(`访问节点 ${node.val} (第 ${newCount} 小)。准备转向右子树。`);
                    setCurr(node.right);
                    setIterPhase("PUSH_LEFT"); // Process right child as new subtree
                } else {
                    setIsFinished(true);
                    setIsPlaying(false);
                    setMessage("遍历结束 (栈空)。");
                }
            }
        };

        // 2. Recursive Logic (Replay)
        const stepRecursive = () => {
            const k = parseInt(kInput);
            if (recIdx >= recSteps.length) {
                setIsFinished(true);
                setIsPlaying(false);
                setMessage("遍历结束。");
                return;
            }

            const node = recSteps[recIdx];
            setCurrentNodeId(node.id);
            setVisitedList(prev => [...prev, node.val]);
            const newCount = visitedCount + 1;
            setVisitedCount(newCount);

            if (newCount === k) {
                setFoundVal(node.val);
                setIsFinished(true);
                setIsPlaying(false);
                setMessage(`🎉 访问节点 ${node.val} (第 ${newCount} 小)。找到目标！`);
                return;
            }

            setMessage(`[递归] 访问节点 ${node.val} (第 ${newCount} 小)。`);
            setRecIdx(recIdx + 1);
        };

        // --- 渲染辅助 ---
        const getNodeStyle = (node) => {
            let fill = "white";
            let stroke = "#94a3b8"; // slate-400
            let strokeWidth = "2";
            let scale = "1";

            const isCurrent = node.id === currentNodeId;
            const isFound = node.val === foundVal;
            const inStack = stack.find(n => n.id === node.id);
            const isVisited = visitedList.includes(node.val);

            if (isFound) {
                fill = "#dcfce7"; // green-100
                stroke = "#16a34a"; // green-600
                strokeWidth = "4";
                scale = "1.2";
            } else if (isCurrent) {
                fill = "#bfdbfe"; // blue-200
                stroke = "#2563eb"; // blue-600
                strokeWidth = "3";
                scale = "1.1";
            } else if (inStack) {
                stroke = "#f59e0b"; // amber-500
                fill = "#fef3c7"; // amber-100
            } else if (isVisited) {
                fill = "#f1f5f9"; // slate-100
                stroke = "#cbd5e1"; // slate-300
            }

            return { fill, stroke, strokeWidth, scale };
        };

        return (
            <div className="max-w-6xl mx-auto p-6">
                {/* 1. 配置区 */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
                    <div className="flex items-center gap-2 mb-3 text-slate-700 font-bold">
                        <Icons.Settings />
                        <span>数据配置</span>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-4 items-end">
                        <div className="flex-1 w-full">
                            <label className="text-xs text-slate-400 font-bold ml-1 mb-1 block">BST 数组 (Level Order)</label>
                            <input
                                type="text"
                                value={inputStr}
                                onChange={(e) => setInputStr(e.target.value)}
                                className="w-full border border-slate-300 rounded-lg px-3 py-2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                        </div>
                        <div className="w-24">
                            <label className="text-xs text-slate-400 font-bold ml-1 mb-1 block">K 值</label>
                            <input type="number" value={kInput} onChange={(e) => setKInput(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={parseInput} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium text-sm h-[42px]">生成树</button>
                            <button onClick={randomInput} className="px-3 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition h-[42px]" title="随机"><Icons.Shuffle /></button>
                        </div>
                    </div>
                </div>

                {/* 2. 主区域 */}
                <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                    {/* Header */}
                    <div className="border-b border-slate-100 bg-slate-50 p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div>
                            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <Icons.GitBranch /> 二叉搜索树第 K 小元素
                            </h1>
                            <p className="text-xs text-slate-500 mt-1">中序遍历 (左-根-右) 产生有序序列。</p>
                        </div>
                        <div className="flex bg-slate-200 p-1 rounded-lg">
                            <button onClick={() => { setMode('iterative'); resetState(); }} className={`px-3 py-1.5 text-sm rounded-md transition-all font-medium ${mode === 'iterative' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>迭代法 (Stack)</button>
                            <button onClick={() => { setMode('recursive'); resetState(); }} className={`px-3 py-1.5 text-sm rounded-md transition-all font-medium ${mode === 'recursive' ? 'bg-white text-purple-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>递归法 (Full)</button>
                        </div>
                    </div>

                    {/* Visualization Canvas */}
                    <div className="flex flex-col lg:flex-row h-[500px]">

                        {/* Left: Tree View */}
                        <div className="flex-1 bg-slate-50 relative overflow-hidden border-r border-slate-100">
                            <svg className="w-full h-full" viewBox={treeViewBox} preserveAspectRatio="xMidYMid meet">
                                {flatNodes.map(node => (
                                    <g key={'line-' + node.id}>
                                        {node.left && <line x1={node.x} y1={node.y} x2={node.left.x} y2={node.left.y} stroke="#cbd5e1" strokeWidth="2" />}
                                        {node.right && <line x1={node.x} y1={node.y} x2={node.right.x} y2={node.right.y} stroke="#cbd5e1" strokeWidth="2" />}
                                    </g>
                                ))}
                                {flatNodes.map(node => {
                                    const style = getNodeStyle(node);
                                    return (
                                        <g key={node.id} className={`node-transition ${style.scale > 1 ? 'pulse-target' : ''}`} style={{transformOrigin: `${node.x}px ${node.y}px`, transform: `scale(${style.scale})`}}>
                                            <circle cx={node.x} cy={node.y} r="20" fill={style.fill} stroke={style.stroke} strokeWidth={style.strokeWidth} />
                                            <text x={node.x} y={node.y} dy="0.35em" textAnchor="middle" className="text-sm font-bold pointer-events-none text-slate-700">{node.val}</text>
                                            {/* Stack Indicator */}
                                            {stack.find(n => n.id === node.id) && mode === 'iterative' && (
                                                <circle cx={node.x + 14} cy={node.y - 14} r="6" fill="#f59e0b" stroke="white" strokeWidth="1.5" />
                                            )}
                                        </g>
                                    );
                                })}
                            </svg>

                            <div className="absolute top-4 left-4 bg-white/90 p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col gap-1">
                                <div className="text-xs font-bold text-slate-400 uppercase tracking-wider">Count</div>
                                <div className="text-3xl font-black text-slate-800">{visitedCount} <span className="text-lg text-slate-400 font-normal">/ {kInput}</span></div>
                            </div>
                        </div>

                        {/* Right: Info Panel */}
                        <div className="w-full lg:w-80 bg-white border-l border-slate-100 flex flex-col">

                            {/* Mode Info */}
                            {mode === 'iterative' ? (
                                <div className="flex-1 flex flex-col p-4 overflow-hidden">
                                    <div className="text-xs font-bold text-slate-400 mb-2 flex items-center gap-2">
                                        <Icons.Layers /> STACK (Path to min)
                                    </div>
                                    <div className="flex-1 overflow-y-auto flex flex-col-reverse gap-1 p-1 border rounded bg-slate-50 min-h-[100px]">
                                        {stack.length === 0 ? <div className="text-center text-slate-300 text-sm py-4">Empty</div> :
                                            stack.map((node, i) => (
                                                <div key={i} className="p-2 rounded text-sm border font-mono mb-1 bg-amber-50 border-amber-200 text-amber-800 fade-enter">
                                                    Node {node.val}
                                                </div>
                                            ))
                                        }
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 p-4 overflow-y-auto">
                                    <div className="text-xs font-bold text-slate-400 mb-2">FULL TRAVERSAL PREVIEW</div>
                                    <div className="text-sm text-slate-500 italic">递归法通常会遍历整个树（或至少左子树），无法像迭代法那样精准控制栈来提前退出。</div>
                                </div>
                            )}

                            {/* Visited List */}
                            <div className="p-4 border-t border-slate-100 h-1/2 flex flex-col">
                                <div className="text-xs font-bold text-slate-400 mb-2 flex items-center gap-2">
                                    <Icons.List /> VISITED SEQUENCE
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 bg-slate-50 rounded border border-slate-200 flex flex-wrap content-start gap-2">
                                    {visitedList.map((val, i) => (
                                        <div key={i} className={`w-8 h-8 flex items-center justify-center rounded font-bold text-sm fade-enter
                                                ${val === foundVal ? 'bg-green-500 text-white shadow-lg scale-110' : 'bg-white border border-slate-200 text-slate-600'}
                                            `}>
                                            {val}
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* Controls */}
                    <div className="border-t border-slate-100 p-4 bg-white">
                        <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex-1 bg-blue-50 text-blue-800 px-4 py-3 rounded-lg text-sm border-l-4 border-blue-500 w-full sm:w-auto shadow-sm transition-all">{message}</div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setIsPlaying(!isPlaying)} disabled={isFinished} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-white font-medium transition ${isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'} disabled:opacity-50`}>{isPlaying ? <Icons.Pause /> : <Icons.Play />} <span className="hidden sm:inline">{isPlaying ? "暂停" : "自动"}</span></button>
                                <button onClick={stepForward} disabled={isPlaying || isFinished} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 font-medium transition disabled:opacity-50"><Icons.Step /><span className="hidden sm:inline">单步</span></button>
                                <button onClick={() => resetState()} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition"><Icons.Reset /></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
