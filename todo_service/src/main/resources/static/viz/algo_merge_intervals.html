<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合并区间 - 算法可视化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .bar-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-enter { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .ruler-tick { position: absolute; bottom: 0; width: 1px; background-color: #cbd5e1; height: 10px; }
        .ruler-label { position: absolute; bottom: -20px; transform: translateX(-50%); font-size: 10px; color: #94a3b8; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 图标组件 ---
    const Icons = {
        Play: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>,
        Pause: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>,
        Step: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>,
        Reset: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12" /><path d="M3 3v9h9" /></svg>,
        Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
        Shuffle: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>,
        Layers: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
    };

    const App = () => {
        // --- 状态定义 ---
        const [inputStr, setInputStr] = useState("[[1,3],[2,6],[8,10],[15,18]]");
        const [intervals, setIntervals] = useState([{start:1, end:3, id:1}, {start:2, end:6, id:2}, {start:8, end:10, id:3}, {start:15, end:18, id:4}]);
        const [mode, setMode] = useState("sort"); // 'brute' | 'sort'

        // 运行状态
        const [isPlaying, setIsPlaying] = useState(false);
        const [isFinished, setIsFinished] = useState(false);
        const [message, setMessage] = useState("准备就绪");

        // 算法状态
        const [resultList, setResultList] = useState([]); // For sort mode
        const [currIdx, setCurrIdx] = useState(0); // Current processing index
        const [activePair, setActivePair] = useState(null); // {prev, curr} IDs for visualization

        // 暴力法状态
        const [bruteList, setBruteList] = useState([]);
        const [bruteI, setBruteI] = useState(0);
        const [bruteJ, setBruteJ] = useState(1);
        const [bruteMerged, setBruteMerged] = useState(false); // Flag if merge happened in this pass

        // 坐标轴范围
        const [maxVal, setMaxVal] = useState(20);

        // --- 初始化/重置 ---
        const parseInput = () => {
            try {
                let arr = JSON.parse(inputStr);
                if (!Array.isArray(arr)) throw new Error("输入必须是数组");
                // Normalize
                arr = arr.map((item, idx) => {
                    if (!Array.isArray(item) || item.length !== 2) throw new Error("每个区间必须是两个数字");
                    return { start: item[0], end: item[1], id: Math.random() };
                });

                const max = Math.max(...arr.map(i => i.end), 10) + 2;
                setMaxVal(max);
                setIntervals(arr);
                resetState(arr);
                setMessage(`数据已加载。共 ${arr.length} 个区间。`);
            } catch (e) {
                setMessage("输入错误: " + e.message);
            }
        };

        const resetState = (arr = intervals) => {
            setIsPlaying(false);
            setIsFinished(false);
            setMessage("状态已重置");
            setActivePair(null);

            // Sort Mode Reset
            setResultList([]);
            setCurrIdx(0);

            // Brute Mode Reset
            // For brute, we work on a copy that shrinks
            setBruteList(arr.map(i => ({...i})));
            setBruteI(0);
            setBruteJ(1);
            setBruteMerged(false);
        };

        const randomInput = () => {
            const count = 5 + Math.floor(Math.random() * 4);
            const arr = [];
            for(let i=0; i<count; i++) {
                const start = Math.floor(Math.random() * 15);
                const len = 1 + Math.floor(Math.random() * 5);
                arr.push([start, start + len]);
            }
            const str = JSON.stringify(arr);
            setInputStr(str);

            // Trigger parse manually logic
            const objArr = arr.map(item => ({ start: item[0], end: item[1], id: Math.random() }));
            const max = Math.max(...objArr.map(i => i.end), 10) + 2;
            setMaxVal(max);
            setIntervals(objArr);
            resetState(objArr);
            setMessage("随机区间已生成。");
        };

        // --- 自动播放 ---
        useEffect(() => {
            let timer;
            if (isPlaying && !isFinished) {
                timer = setInterval(() => {
                    stepForward();
                }, 1000);
            }
            return () => clearInterval(timer);
        }, [isPlaying, isFinished, mode, currIdx, resultList, bruteI, bruteJ, bruteList]);

        const stepForward = () => {
            if (isFinished) return;
            if (mode === 'sort') stepSort();
            else stepBrute();
        };

        // 1. 排序扫描法 O(NlogN)
        const stepSort = () => {
            // Phase 0: Sort if not started
            if (currIdx === 0 && resultList.length === 0) {
                const sorted = [...intervals].sort((a,b) => a.start - b.start);
                // Check if input was already sorted visual logic?
                // Let's just update intervals to sorted version visual
                setIntervals(sorted);
                setResultList([sorted[0]]);
                setCurrIdx(1);
                setMessage(`第一步：按 Start 排序。\n初始化：将第一个区间 [${sorted[0].start},${sorted[0].end}] 加入结果列表。`);
                return;
            }

            if (currIdx >= intervals.length) {
                setIsFinished(true);
                setIsPlaying(false);
                setMessage("遍历结束！所有区间已合并。");
                setActivePair(null);
                return;
            }

            const current = intervals[currIdx];
            const lastMergedIdx = resultList.length - 1;
            const lastMerged = resultList[lastMergedIdx];

            setActivePair({ prev: lastMerged.id, curr: current.id });

            // Check Overlap: current.start <= last.end
            if (current.start <= lastMerged.end) {
                // Merge
                const newEnd = Math.max(lastMerged.end, current.end);
                const newMerged = { ...lastMerged, end: newEnd };

                const newResultList = [...resultList];
                newResultList[lastMergedIdx] = newMerged;

                setResultList(newResultList);
                setMessage(`发现重叠！\n[${current.start}, ${current.end}] 与结果集尾部 [${lastMerged.start}, ${lastMerged.end}] 重叠。\n合并为: [${newMerged.start}, ${newMerged.end}]`);
            } else {
                // No overlap
                setResultList([...resultList, current]);
                setMessage(`无重叠。\n[${current.start}, ${current.end}] 的起点 > 结果集尾部的终点 (${lastMerged.end})。\n直接加入结果集。`);
            }
            setCurrIdx(currIdx + 1);
        };

        // 2. 暴力法 O(N^2)
        const stepBrute = () => {
            // Logic:
            // Compare list[i] with list[j]
            // If overlap, merge to list[i], remove list[j], restart loop (or simple restart j)
            // If j reaches end, i++

            let list = [...bruteList];

            if (bruteI >= list.length - 1) {
                if (bruteMerged) {
                    // Restart pass if any merge happened (naive brute force to be safe)
                    setBruteI(0);
                    setBruteJ(1);
                    setBruteMerged(false);
                    setMessage("一轮扫描结束，发生过合并。重新扫描以确保无遗漏...");
                } else {
                    setIsFinished(true);
                    setIsPlaying(false);
                    setMessage("合并完成！");
                }
                setActivePair(null);
                return;
            }

            if (bruteJ >= list.length) {
                setBruteI(bruteI + 1);
                setBruteJ(bruteI + 2);
                return;
            }

            const a = list[bruteI];
            const b = list[bruteJ];
            setActivePair({ prev: a.id, curr: b.id });

            // Check overlap: max(start) <= min(end)
            const overlap = Math.max(a.start, b.start) <= Math.min(a.end, b.end);

            if (overlap) {
                const newStart = Math.min(a.start, b.start);
                const newEnd = Math.max(a.end, b.end);
                const merged = { ...a, start: newStart, end: newEnd };

                list[bruteI] = merged;
                list.splice(bruteJ, 1); // Remove b

                setBruteList(list);
                setBruteMerged(true);
                // Stay at i, j (which is now a new element) to re-check
                setMessage(`发现重叠！[${a.start},${a.end}] 和 [${b.start},${b.end}]。\n合并为 [${merged.start},${merged.end}]，移除后者。`);
            } else {
                setMessage(`检查 [${a.start},${a.end}] 和 [${b.start},${b.end}]：无重叠。`);
                setBruteJ(bruteJ + 1);
            }
        };

        // --- 渲染辅助 ---
        const getBarWidth = (start, end) => `${((end - start) / maxVal) * 100}%`;
        const getBarLeft = (start) => `${(start / maxVal) * 100}%`;

        const renderBar = (interval, type, idx) => {
            let color = "bg-blue-400";
            let ring = "";
            let opacity = "opacity-100";

            if (mode === 'sort') {
                if (type === 'input') {
                    if (idx < currIdx) { color = "bg-slate-300"; opacity = "opacity-40"; } // Processed
                    else if (idx === currIdx) { color = "bg-blue-500"; ring = "ring-2 ring-blue-300"; } // Processing
                } else { // Result list
                    if (idx === resultList.length - 1) { color = "bg-green-500"; ring = "ring-2 ring-green-300"; } // Just merged/added
                    else { color = "bg-green-600"; }
                }
            } else {
                // Brute
                if (idx === bruteI) { color = "bg-blue-500"; ring = "ring-2 ring-blue-300"; }
                else if (idx === bruteJ) { color = "bg-orange-500"; ring = "ring-2 ring-orange-300"; }
                else { color = "bg-slate-400"; }
            }

            return (
                <div key={interval.id} className={`absolute h-8 rounded-md shadow-sm flex items-center justify-center text-xs text-white font-bold bar-transition ${color} ${ring} ${opacity}`}
                     style={{ left: getBarLeft(interval.start), width: getBarWidth(interval.start, interval.end), top: `${idx * 40}px` }}>
                    [{interval.start}, {interval.end}]
                </div>
            );
        };

        return (
            <div className="max-w-4xl mx-auto p-6">
                {/* 1. 配置区 */}
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-6">
                    <div className="flex items-center gap-2 mb-3 text-slate-700 font-bold">
                        <Icons.Settings />
                        <span>数据配置</span>
                    </div>
                    <div className="flex flex-col sm:flex-row gap-3">
                        <div className="flex-1">
                            <label className="text-xs text-slate-400 font-bold ml-1 mb-1 block">区间列表 (JSON)</label>
                            <input
                                type="text"
                                value={inputStr}
                                onChange={(e) => setInputStr(e.target.value)}
                                className="w-full border border-slate-300 rounded-lg px-3 py-2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                            />
                        </div>
                        <div className="flex items-end gap-2">
                            <button onClick={parseInput} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium text-sm h-[42px]">
                                加载
                            </button>
                            <button onClick={randomInput} className="px-3 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition h-[42px]" title="随机">
                                <Icons.Shuffle />
                            </button>
                        </div>
                    </div>
                </div>

                {/* 2. 主区域 */}
                <div className="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
                    {/* Header */}
                    <div className="border-b border-slate-100 bg-slate-50 p-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div>
                            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                <Icons.Layers /> 合并区间 (Merge Intervals)
                            </h1>
                            <p className="text-xs text-slate-500 mt-1">合并所有重叠的区间，生成一个新的不重叠区间列表。</p>
                        </div>
                        <div className="flex bg-slate-200 p-1 rounded-lg">
                            <button
                                onClick={() => { setMode('sort'); resetState(); }}
                                className={`px-3 py-1.5 text-sm rounded-md transition-all font-medium ${mode === 'sort' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                排序扫描 O(NlogN)
                            </button>
                            <button
                                onClick={() => { setMode('brute'); resetState(); }}
                                className={`px-3 py-1.5 text-sm rounded-md transition-all font-medium ${mode === 'brute' ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                暴力合并 O(N²)
                            </button>
                        </div>
                    </div>

                    {/* Visualization Canvas */}
                    <div className="p-6 bg-slate-50 min-h-[400px] flex flex-col relative">

                        {/* Ruler */}
                        <div className="w-full h-6 mb-2 relative border-b border-slate-300">
                            {Array.from({length: Math.ceil(maxVal/5) + 1}).map((_, i) => (
                                <div key={i} className="ruler-tick" style={{ left: `${(i*5 / maxVal) * 100}%` }}>
                                    <span className="ruler-label">{i*5}</span>
                                </div>
                            ))}
                        </div>

                        {/* Mode Specific Views */}
                        {mode === 'sort' ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 h-full flex-1">
                                {/* Left: Input List */}
                                <div className="relative border-r border-slate-200 pr-4">
                                    <h3 className="text-xs font-bold text-slate-400 mb-4 uppercase">Source Intervals (Sorted)</h3>
                                    <div className="relative h-full">
                                        {intervals.map((interval, idx) => renderBar(interval, 'input', idx))}
                                    </div>
                                </div>

                                {/* Right: Result List */}
                                <div className="relative pl-2">
                                    <h3 className="text-xs font-bold text-green-600 mb-4 uppercase">Merged Results</h3>
                                    <div className="relative h-full">
                                        {resultList.map((interval, idx) => renderBar(interval, 'result', idx))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            /* Brute Force View */
                            <div className="relative flex-1">
                                <h3 className="text-xs font-bold text-slate-400 mb-4 uppercase">Current List State</h3>
                                <div className="relative h-full">
                                    {bruteList.map((interval, idx) => renderBar(interval, 'brute', idx))}
                                </div>
                            </div>
                        )}

                    </div>

                    {/* Controls */}
                    <div className="border-t border-slate-100 p-4 bg-white">
                        <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div className="flex-1 bg-blue-50 text-blue-800 px-4 py-3 rounded-lg text-sm border-l-4 border-blue-500 w-full sm:w-auto whitespace-pre-line shadow-sm">
                                {message}
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setIsPlaying(!isPlaying)} disabled={isFinished} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-white font-medium transition ${isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'} disabled:opacity-50`}>
                                    {isPlaying ? <Icons.Pause /> : <Icons.Play />}
                                    <span className="hidden sm:inline">{isPlaying ? "暂停" : "自动"}</span>
                                </button>
                                <button onClick={stepForward} disabled={isPlaying || isFinished} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 font-medium transition disabled:opacity-50">
                                    <Icons.Step />
                                    <span className="hidden sm:inline">单步</span>
                                </button>
                                <button onClick={() => resetState()} className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-lg transition">
                                    <Icons.Reset />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
